server {
    listen       80;
    server_name  localhost;

    location = / {
        return 301 /api/docs;
    }

    location /api/docs {
        proxy_pass http://127.0.0.1:5200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /notes {
        proxy_pass http://127.0.0.1:5200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:5200;
        proxy_set_header Host $host;
    }

    location / {
        return 403;
    }
}