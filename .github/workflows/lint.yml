name: Lint

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install app dependencies
        run: pnpm --dir Lab1/mywebapp install --frozen-lockfile

      - name: ESLint (NestJS/TypeScript)
        run: pnpm --dir Lab1/mywebapp run lint:ci

      - name: Install lint tooling
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck yamllint curl
          HADOLINT_VERSION="v2.12.0"
          curl -fsSL "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64" -o /tmp/hadolint
          sudo install -m 0755 /tmp/hadolint /usr/local/bin/hadolint

      - name: Hadolint (all Dockerfiles)
        run: |
          set -euo pipefail
          mapfile -t dockerfiles < <(find Lab1 -type f -name "Dockerfile")
          if [ "${#dockerfiles[@]}" -gt 0 ]; then
            hadolint --failure-threshold error "${dockerfiles[@]}"
          fi

      - name: Shellcheck (all shell scripts)
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files "*.sh")
          if [ "${#files[@]}" -gt 0 ]; then
            shellcheck -S warning "${files[@]}"
          fi

      - name: Yamllint (all YAML files)
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files "*.yml" "*.yaml")
          if [ "${#files[@]}" -gt 0 ]; then
            yamllint -c Lab1/.yamllint.yml "${files[@]}"
          fi
