name: Lint

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install app dependencies
        run: pnpm --dir Lab1/mywebapp install --frozen-lockfile

      - name: ESLint (NestJS/TypeScript)
        run: pnpm --dir Lab1/mywebapp run lint:ci

      - name: Validate lint tooling on runner
        run: |
          set -euo pipefail
          command -v hadolint >/dev/null
          command -v shellcheck >/dev/null
          command -v yamllint >/dev/null

      - name: Hadolint (all Dockerfiles)
        run: |
          set -euo pipefail
          mapfile -t dockerfiles < <(find Lab1 -type f -name "Dockerfile")
          if [ "${#dockerfiles[@]}" -gt 0 ]; then
            hadolint --failure-threshold error "${dockerfiles[@]}"
          fi

      - name: Shellcheck (all shell scripts)
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f -name "*.sh")
          if [ "${#files[@]}" -gt 0 ]; then
            shellcheck "${files[@]}"
          fi

      - name: Yamllint (all YAML files)
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -type f \( -name "*.yml" -o -name "*.yaml" \))
          if [ "${#files[@]}" -gt 0 ]; then
            yamllint -c Lab1/.yamllint.yml "${files[@]}"
          fi
