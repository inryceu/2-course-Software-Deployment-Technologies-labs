name: Tests

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install app dependencies
        run: pnpm --dir mywebapp install --frozen-lockfile

      - name: Run unit tests
        run: pnpm --dir mywebapp run test -- --runInBand

      - name: Run integration tests (e2e)
        run: pnpm --dir mywebapp run test:e2e -- --runInBand

      - name: Run coverage with threshold gate (min 40%)
        run: pnpm --dir mywebapp run test:cov -- --runInBand

      - name: Upload coverage artifact (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: mywebapp/coverage
          if-no-files-found: error
