name: Tests

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install app dependencies
        run: pnpm --dir Lab1/mywebapp install --frozen-lockfile

      - name: Run unit tests
        run: |
          set -euo pipefail
          if find Lab1/mywebapp/src -type f -name "*.spec.ts" -print -quit | grep -q .; then
            pnpm --dir Lab1/mywebapp exec jest --runInBand
          else
            echo "No unit tests found. Skipping."
          fi

      - name: Run integration tests (e2e)
        run: |
          set -euo pipefail
          if find Lab1/mywebapp/test -type f \( -name "*.e2e-spec.ts" -o -name "*.spec.ts" \) -print -quit | grep -q .; then
            pnpm --dir Lab1/mywebapp exec jest --config ./test/jest-e2e.json --runInBand
          else
            echo "No e2e tests found. Skipping."
          fi

      - name: Run coverage with threshold gate (min 40%)
        run: |
          set -euo pipefail
          if find Lab1/mywebapp/src -type f -name "*.spec.ts" -print -quit | grep -q .; then
            pnpm --dir Lab1/mywebapp exec jest --coverage --runInBand
          else
            echo "No unit tests found. Skipping coverage gate."
          fi

      - name: Upload coverage artifact (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: Lab1/mywebapp/coverage
          if-no-files-found: error
