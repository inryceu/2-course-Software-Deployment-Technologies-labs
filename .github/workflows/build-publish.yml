name: Build and Publish

on:
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: self-hosted
    if: hashFiles('mywebapp/package.json') != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install app dependencies
        run: pnpm --dir mywebapp install --frozen-lockfile

      - name: ESLint (NestJS/TypeScript)
        run: pnpm --dir mywebapp run lint:ci

  test:
    runs-on: self-hosted
    needs: lint
    if: hashFiles('mywebapp/package.json') != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install app dependencies
        run: pnpm --dir mywebapp install --frozen-lockfile

      - name: Run unit tests
        run: pnpm --dir mywebapp run test -- --runInBand

      - name: Run integration tests (e2e)
        run: pnpm --dir mywebapp run test:e2e -- --runInBand

      - name: Run coverage with threshold gate (min 40%)
        run: pnpm --dir mywebapp run test:cov -- --runInBand

  build_and_publish:
    runs-on: self-hosted
    needs:
      - lint
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag type (annotated tags only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TYPE="$(git cat-file -t "${GITHUB_REF_NAME}")"
          test "${TYPE}" = "tag"

      - name: Set lowercase image name
        id: image
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:sha-${{ github.sha }}

      - name: Build and push (annotated tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:stable
            ${{ steps.image.outputs.image }}:${{ github.ref_name }}
