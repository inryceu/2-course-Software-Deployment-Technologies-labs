name: Build and Publish

on:
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install app dependencies
        run: pnpm --dir Lab1/mywebapp install --frozen-lockfile

      - name: ESLint (NestJS/TypeScript)
        run: pnpm --dir Lab1/mywebapp run lint:ci

  test:
    runs-on: self-hosted
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install app dependencies
        run: pnpm --dir Lab1/mywebapp install --frozen-lockfile

      - name: Run unit tests
        run: |
          set -euo pipefail
          if find Lab1/mywebapp/src -type f -name "*.spec.ts" -print -quit | grep -q .; then
            pnpm --dir Lab1/mywebapp exec jest --runInBand
          else
            echo "No unit tests found. Skipping."
          fi

      - name: Run integration tests (e2e)
        run: |
          set -euo pipefail
          if find Lab1/mywebapp/test -type f \( -name "*.e2e-spec.ts" -o -name "*.spec.ts" \) -print -quit | grep -q .; then
            pnpm --dir Lab1/mywebapp exec jest --config ./test/jest-e2e.json --runInBand
          else
            echo "No e2e tests found. Skipping."
          fi

      - name: Run coverage with threshold gate (min 40%)
        run: |
          set -euo pipefail
          if find Lab1/mywebapp/src -type f -name "*.spec.ts" -print -quit | grep -q .; then
            pnpm --dir Lab1/mywebapp exec jest --coverage --runInBand
          else
            echo "No unit tests found. Skipping coverage gate."
          fi

  build_and_publish:
    runs-on: self-hosted
    needs:
      - lint
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
          submodules: false

      - name: Validate tag exists
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch --force --tags
          TYPE="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(objecttype)' | head -n 1)"
          test -n "${TYPE}"

      - name: Set lowercase image name
        id: image
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: Lab1
          file: Lab1/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:sha-${{ github.sha }}

      - name: Build and push (annotated tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: Lab1
          file: Lab1/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:stable
            ${{ steps.image.outputs.image }}:${{ github.ref_name }}
