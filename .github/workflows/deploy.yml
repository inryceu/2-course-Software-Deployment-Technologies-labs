name: Deploy

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
          submodules: false

      - name: Validate tag exists
        run: |
          git fetch --force --tags
          TYPE="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(objecttype)' | head -n 1)"
          test -n "${TYPE}"

      - name: Set lowercase image name
        id: image
        shell: bash
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_REF_NAME}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Deploy to target VM via SSH
        env:
          TARGET_HOST: ${{ secrets.TARGET_HOST }}
          TARGET_USER: ${{ secrets.TARGET_USER }}
          TARGET_PORT: ${{ secrets.TARGET_PORT }}
          TARGET_DIR: ${{ secrets.TARGET_DIR }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          APP_IMAGE: ${{ steps.image.outputs.image }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: bash Lab1/automation/ci/deploy_via_ssh.sh
